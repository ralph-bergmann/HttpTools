name: http_intercept_example
description: http_intercept_example
version: 1.0.0
publish_to: none

environment:
  sdk: ^3.10.8
  flutter: ^3.38.9
resolution: workspace
 
dependencies:
  flutter:
    sdk: flutter

  chopper: ^8.5.0
  cronet_http: ^1.8.0
  cupertino_http: ^2.4.0
  dio: ^5.9.1
  dio_compatibility_layer: ^0.1.0
  http: ^1.6.0
  http_client_cache:
    path: ../../http_client_cache
  http_image_provider: ^1.1.0
  http_client_interceptor:
    path: ../../http_client_interceptor
  http_client_logger:
    path: ../../http_client_logger
  json_annotation: ^4.11.0
  logging: ^1.3.0
  path_provider: ^2.1.5
  retrofit: ^4.9.2

dev_dependencies:
  build_runner: ^2.11.1
  chopper_generator: ^8.6.0
  json_serializable: ^6.13.0
  retrofit_generator: ^10.2.3

flutter:
  uses-material-design: true
